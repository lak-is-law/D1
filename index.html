<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
  <script>
    (function () {
      var base = window.location.pathname.replace(/\/$/, "");
      var target = base + "/public/index.html" + window.location.search + window.location.hash;
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  Redirecting to app...
</body>
</html>
